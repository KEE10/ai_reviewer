name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ai_reviewer
  AWS_REGION: eu-central-1
  DOCKER_HUB_REPOSITORY: ${{ secrets.DOCKER_HUB_USERNAME }}/ai_reviewer

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting dependencies
        run: |
          pip install \
            ruff \
            mypy

      - name: Run Ruff (linting)
        id: ruff
        run: |
          ruff check . --output-format=github

      #- name: Run mypy (type checking)
      #  id: mypy
      #  run: |
      #    mypy . --ignore-missing-imports

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: tests not yet implemented
        run: echo "Tests to be implemented!"


  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint  # change to test once tests are written

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_REPOSITORY }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=production
            BUILD_DATE=${{ github.event.pull_request.updated_at }}
            GIT_SHA=${{ github.sha }}

      - name: Verify image pushed
        run: |
          echo "Image pushed: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.yml docker-compose.prod.yml \
            ec2-user@${{ secrets.EC2_HOST }}:/app/

      - name: Create .env on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} "cat > /app/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          GITHUB_SECRET=${{ secrets.GH_SECRET }}
          REDIS_TTL=${{ secrets.REDIS_TTL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          EOF"

      - name: Deploy to EC2
        id: deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            ec2-user@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -ex  # Exit on any error and print each command

            echo "Logging into Docker Hub"
            echo  "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            echo "Pulling new image"
            docker pull khalelam/ai_reviewer:latest

            cd /app

            echo "Stopping old containers"
            docker-compose down --remove-orphans

            echo "Starting new containers"
            docker-compose --env-file ./.env up -d

            echo "Waiting for health check"
            sleep 10

            echo "Checking container status"
            docker-compose ps

            echo "Cleaning up old images"
            docker image prune -f

            echo "Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            ec2-user@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            cd /app

            # Check if containers are running
            if ! docker-compose ps | grep -q "Up"; then
              echo "Containers are not running!"
              docker-compose logs
              exit 1
            fi

            # Check health endpoint
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
            if [ "$HEALTH" != "200" ]; then
              echo "Health check failed! Status: $HEALTH"
              docker-compose logs backend
              exit 1
            fi

            echo "Deployment verified! Health check passed."
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build, deploy]
    if: failure()  # Only run if any job fails

    steps:
      - name: Get failed job
        id: failed_job
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "FAILED_JOB= Lint" >> $GITHUB_OUTPUT
            echo "FAILED_STEP=Code linting failed. Check ruff/black/mypy errors." >> $GITHUB_OUTPUT
          elif [ "${{ needs.test.result }}" == "failure" ]; then
            echo "FAILED_JOB= Tests" >> $GITHUB_OUTPUT
            echo "FAILED_STEP=Tests failed. Check pytest output." >> $GITHUB_OUTPUT
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "FAILED_JOB= Build" >> $GITHUB_OUTPUT
            echo "FAILED_STEP=Docker build/push failed. Check Dockerfile." >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "FAILED_JOB= Deploy" >> $GITHUB_OUTPUT
            echo "FAILED_STEP=Deployment to EC2 failed. Check SSH/Docker." >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI/CD Pipeline Failed

              **Failed Job:** ${{ steps.failed_job.outputs.FAILED_JOB }}
              **Details:** ${{ steps.failed_job.outputs.FAILED_STEP }}

              **Commit:** ${{ github.sha }}
              **Branch:** ${{ github.head_ref }}

              Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            })
